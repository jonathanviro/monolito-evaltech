version: '3.8'
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: evaltest
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret123}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d evaltest"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./packages/backend
    environment:
      DATABASE_URL: postgresql://admin:${DB_PASSWORD:-secret123}@db:5432/evaltest
      JWT_SECRET: ${JWT_SECRET:-super-secret-key-change-in-production}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@evaltest.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./packages/frontend
    environment:
      NEXT_PUBLIC_API_URL: http://backend:4000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
